<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lopez Wellness Inc. – Therapists</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f4; --surface: #ffffff; --border: #e5e5e3;
    --text: #1a1a18; --muted: #6b6b67; --accent: #2563eb; --accent-light: #eff6ff;
    --green: #16a34a; --green-light: #dcfce7; --red: #dc2626; --red-light: #fee2e2;
    --amber: #d97706; --amber-light: #fef3c7; --radius: 12px; --radius-sm: 8px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 14px; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--muted); }
  .topbar-sep { color: var(--border); }
  .topbar-current { color: var(--text); font-weight: 500; }
  .content { padding: 32px; flex: 1; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
  .page-title { font-size: 26px; font-weight: 600; letter-spacing: -.5px; }
  .page-subtitle { color: var(--muted); font-size: 13.5px; margin-top: 4px; }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius-sm); font-family: inherit; font-size: 13.5px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: background .15s; white-space: nowrap; }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-sm { padding: 6px 12px; font-size: 12.5px; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-red { background: var(--red-light); color: var(--red); }
  .badge-amber { background: var(--amber-light); color: var(--amber); }
  .badge-blue { background: var(--accent-light); color: var(--accent); }
  .badge-muted { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

  /* Metric cards */
  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px 18px; }
  .metric-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .metric-label { font-size: 12.5px; color: var(--muted); }
  .metric-icon { display: flex; align-items: center; justify-content: center; }
  .metric-value { font-size: 24px; font-weight: 600; letter-spacing: -.5px; font-family: 'DM Mono', monospace; margin-bottom: 6px; min-height: 32px; }
  .metric-sub { font-size: 12px; color: var(--muted); }

  /* Card & table */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
  .card-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .card-title { font-size: 14px; font-weight: 600; }
  .search-box { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 12px; width: 220px; }
  .search-box input { background: none; border: none; outline: none; font-family: inherit; font-size: 13px; color: var(--text); width: 100%; }
  .search-box input::placeholder { color: var(--muted); }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; padding: 11px 22px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; background: var(--bg); border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafaf9; }
  tbody td { padding: 14px 22px; font-size: 13.5px; vertical-align: middle; }

  /* Therapist avatar */
  .therapist-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; flex-shrink: 0; background: var(--accent-light); color: var(--accent); }

  /* Filters */
  .filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filter-select { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 12px; font-family: inherit; font-size: 13px; color: var(--text); cursor: pointer; }

  /* Loading / Error */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-row td { text-align: center; color: var(--muted); padding: 30px !important; }
  .error-banner { background: var(--red-light); color: var(--red); padding: 12px 18px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 20px; display: none; }
</style>
</head>
<body id="therapists">

<!-- ══ SIDEBAR ══ -->
<div id="sidebar-root"></div>

<!-- ══ MAIN ══ -->
<main class="main">
  <div class="topbar">
    <span>Operations</span>
    <span class="topbar-sep">›</span>
    <span class="topbar-current">Therapists</span>
  </div>

  <div class="content">
    <div id="error-banner" class="error-banner"></div>

    <div class="page-header">
      <div>
        <h1 class="page-title">Therapists</h1>
        <p class="page-subtitle">Manage all therapists across Lopez Wellness branches.</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openAddTherapist()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Therapist
        </button>
      </div>
    </div>

    <!-- Metric Cards -->
    <div class="metric-grid">
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">Total Therapists</span>
          <div class="metric-icon" style="color:var(--accent)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          </div>
        </div>
        <div class="metric-value" id="metric-total"><span class="spinner"></span></div>
        <div class="metric-sub" id="metric-total-sub"></div>
      </div>
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">Active</span>
          <div class="metric-icon" style="color:var(--green)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <div class="metric-value" id="metric-active"><span class="spinner"></span></div>
        <div class="metric-sub">Currently working</div>
      </div>
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">On Leave</span>
          <div class="metric-icon" style="color:var(--amber)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
        </div>
        <div class="metric-value" id="metric-leave"><span class="spinner"></span></div>
        <div class="metric-sub">Temporarily away</div>
      </div>
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">Inactive</span>
          <div class="metric-icon" style="color:var(--red)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          </div>
        </div>
        <div class="metric-value" id="metric-inactive"><span class="spinner"></span></div>
        <div class="metric-sub">Not currently working</div>
      </div>
    </div>

    <!-- Therapist Table -->
    <div class="card">
      <div class="card-header">
        <span class="card-title" id="table-count">Therapists</span>
        <div class="filter-bar">
          <select class="filter-select" id="branch-filter" onchange="applyFilters()">
            <option value="">All Branches</option>
          </select>
          <select class="filter-select" id="status-filter" onchange="applyFilters()">
            <option value="">All Statuses</option>
            <option value="active">Active</option>
            <option value="on_leave">On Leave</option>
            <option value="inactive">Inactive</option>
          </select>
          <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Search therapists…" oninput="applyFilters()">
          </div>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Therapist</th>
            <th>Branch</th>
            <th>Phone</th>
            <th>Hire Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="therapist-tbody">
          <tr class="loading-row"><td colspan="6"><span class="spinner"></span> Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://bzizemhbfisbjrllyqfu.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6aXplbWhiZmlzYmpybGx5cWZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNTA4NzksImV4cCI6MjA4NTcyNjg3OX0.6K7B5reuK2b9YJO0CqtJH_VB8GLUa9aKvlb4fboVB-s';
  const H = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };

  async function db(table, params = '') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, { headers: H });
    if (!r.ok) throw new Error(`${table} ${r.status}`);
    return r.json();
  }

  async function dbInsert(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST', headers: { ...H, 'Prefer': 'return=representation' },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  async function dbUpdate(table, id, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH', headers: { ...H, 'Prefer': 'return=representation' },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 6000);
  }

  function initials(name) {
    return (name || '?').split(/[\s–\-]+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function statusBadge(s) {
    if (s === 'active')   return '<span class="badge badge-green">● Active</span>';
    if (s === 'on_leave') return '<span class="badge badge-amber">● On Leave</span>';
    if (s === 'inactive') return '<span class="badge badge-red">● Inactive</span>';
    return `<span class="badge badge-muted">${s || '—'}</span>`;
  }

  let _allTherapists = [];
  let _branches = [];

  function branchName(id) {
    return _branches.find(b => b.id === id)?.name || '—';
  }

  function renderTable(therapists) {
    const tbody = document.getElementById('therapist-tbody');
    document.getElementById('table-count').textContent =
      therapists.length + ' Therapist' + (therapists.length !== 1 ? 's' : '');

    if (!therapists.length) {
      tbody.innerHTML = '<tr class="loading-row"><td colspan="6">No therapists found.</td></tr>';
      return;
    }

    tbody.innerHTML = therapists.map(t => {
      const hireDate = t.hire_date
        ? new Date(t.hire_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        : '—';
      return `<tr>
        <td><div style="display:flex;align-items:center;gap:10px">
          <div class="therapist-avatar">${initials(t.full_name)}</div>
          <div>
            <div style="font-weight:500">${t.full_name}</div>
            ${t.email ? `<div style="font-size:12px;color:var(--muted)">${t.email}</div>` : ''}
          </div>
        </div></td>
        <td style="color:var(--muted)">${branchName(t.branch_id)}</td>
        <td style="color:var(--muted)">${t.phone || '—'}</td>
        <td style="color:var(--muted);font-size:12.5px">${hireDate}</td>
        <td>${statusBadge(t.status)}</td>
        <td><button class="btn btn-sm" onclick="editStatus('${t.id}','${t.status}',${JSON.stringify(t.full_name)})">Edit Status</button></td>
      </tr>`;
    }).join('');
  }

  function updateMetrics() {
    const active   = _allTherapists.filter(t => t.status === 'active').length;
    const onLeave  = _allTherapists.filter(t => t.status === 'on_leave').length;
    const inactive = _allTherapists.filter(t => t.status === 'inactive').length;
    document.getElementById('metric-active').textContent   = active;
    document.getElementById('metric-leave').textContent    = onLeave;
    document.getElementById('metric-inactive').textContent = inactive;
  }

  function applyFilters() {
    const branchId = document.getElementById('branch-filter').value;
    const status   = document.getElementById('status-filter').value;
    const search   = document.getElementById('search-input').value.toLowerCase();

    let result = _allTherapists;
    if (branchId) result = result.filter(t => t.branch_id === branchId);
    if (status)   result = result.filter(t => t.status === status);
    if (search)   result = result.filter(t =>
      (t.full_name || '').toLowerCase().includes(search) ||
      branchName(t.branch_id).toLowerCase().includes(search) ||
      (t.phone || '').includes(search) ||
      (t.email || '').toLowerCase().includes(search)
    );

    renderTable(result);
  }

  async function loadTherapists() {
    try {
      [_branches, _allTherapists] = await Promise.all([
        db('branches', '?select=id,name&order=name'),
        db('therapists', '?select=*&order=full_name')
      ]);

      const branchFilter = document.getElementById('branch-filter');
      _branches.forEach(b => {
        branchFilter.insertAdjacentHTML('beforeend', `<option value="${b.id}">${b.name}</option>`);
      });

      document.getElementById('metric-total').textContent     = _allTherapists.length;
      document.getElementById('metric-total-sub').textContent = 'Across ' + _branches.length + ' branches';
      updateMetrics();
      renderTable(_allTherapists);
    } catch (e) {
      showError('Could not load therapists. ' + e.message);
      ['metric-total', 'metric-active', 'metric-leave', 'metric-inactive'].forEach(id => {
        document.getElementById(id).textContent = '—';
      });
      document.getElementById('therapist-tbody').innerHTML =
        '<tr class="loading-row"><td colspan="6">Failed to load data.</td></tr>';
    }
  }

  function editStatus(id, current, name) {
    const options = ['active', 'on_leave', 'inactive'];
    const choice  = prompt(`Change status for "${name}"?\nOptions: active, on_leave, inactive\nCurrent: ${current}`);
    if (!choice || !options.includes(choice)) return;
    dbUpdate('therapists', id, { status: choice })
      .then(() => {
        const t = _allTherapists.find(t => t.id === id);
        if (t) t.status = choice;
        updateMetrics();
        applyFilters();
      })
      .catch(e => showError('Update failed: ' + e.message));
  }

  function openAddTherapist() {
    if (!_branches.length) { showError('Branches not loaded yet.'); return; }
    const branchList = _branches.map((b, i) => `${i + 1}. ${b.name}`).join('\n');
    const bIdx = parseInt(prompt('Select branch number:\n' + branchList)) - 1;
    if (isNaN(bIdx) || !_branches[bIdx]) return;
    const full_name = prompt('Full name:');
    if (!full_name) return;
    const phone = prompt('Phone number (optional):') || null;
    const email = prompt('Email (optional):') || null;
    dbInsert('therapists', { branch_id: _branches[bIdx].id, full_name, phone, email, status: 'active' })
      .then(() => loadTherapists())
      .catch(e => showError('Could not add therapist: ' + e.message));
  }

  loadTherapists();
</script>
<script src="lopez-wellness-nav.js"></script>
<script>LWNav.init();</script>
</body>
</html>
