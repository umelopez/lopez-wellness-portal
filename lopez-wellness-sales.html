<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lopez Wellness Inc. – Sales</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f4; --surface: #ffffff; --border: #e5e5e3;
    --text: #1a1a18; --muted: #6b6b67; --accent: #2563eb; --accent-light: #eff6ff;
    --green: #16a34a; --green-light: #dcfce7; --red: #dc2626; --red-light: #fee2e2;
    --amber: #d97706; --amber-light: #fef3c7; --radius: 12px; --radius-sm: 8px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 14px; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--muted); }
  .topbar-sep { color: var(--border); }
  .topbar-current { color: var(--text); font-weight: 500; }
  .content { padding: 32px; flex: 1; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
  .page-title { font-size: 26px; font-weight: 600; letter-spacing: -.5px; }
  .page-subtitle { color: var(--muted); font-size: 13.5px; margin-top: 4px; }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius-sm); font-family: inherit; font-size: 13.5px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: background .15s; white-space: nowrap; }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-sm { padding: 6px 12px; font-size: 12.5px; }
  .btn-group { display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .btn-group .btn { border: none; border-radius: 0; border-right: 1px solid var(--border); }
  .btn-group .btn:last-child { border-right: none; }
  .btn-group .btn.active { background: var(--accent); color: #fff; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-red { background: var(--red-light); color: var(--red); }
  .badge-amber { background: var(--amber-light); color: var(--amber); }
  .badge-blue { background: var(--accent-light); color: var(--accent); }
  .badge-muted { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .badge-purple { background: #f3e8ff; color: #7c3aed; }

  /* Metric cards */
  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px 18px; }
  .metric-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .metric-label { font-size: 12.5px; color: var(--muted); }
  .metric-icon { display: flex; align-items: center; justify-content: center; }
  .metric-value { font-size: 24px; font-weight: 600; letter-spacing: -.5px; font-family: 'DM Mono', monospace; margin-bottom: 6px; min-height: 32px; }
  .metric-sub { font-size: 12px; color: var(--muted); }

  /* Chart */
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; margin-bottom: 24px; }
  .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .chart-subtitle { font-size: 12.5px; color: var(--muted); margin-bottom: 18px; }

  /* Card & table */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
  .card-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .card-title { font-size: 14px; font-weight: 600; }
  .search-box { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 12px; width: 220px; }
  .search-box input { background: none; border: none; outline: none; font-family: inherit; font-size: 13px; color: var(--text); width: 100%; }
  .search-box input::placeholder { color: var(--muted); }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; padding: 11px 22px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; background: var(--bg); border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafaf9; }
  tbody td { padding: 14px 22px; font-size: 13.5px; vertical-align: middle; }

  /* Filters */
  .filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filter-select { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 12px; font-family: inherit; font-size: 13px; color: var(--text); cursor: pointer; }
  .filter-date { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 12px; font-family: inherit; font-size: 13px; color: var(--text); cursor: pointer; }

  /* Loading / Error */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-row td { text-align: center; color: var(--muted); padding: 30px !important; }
  .error-banner { background: var(--red-light); color: var(--red); padding: 12px 18px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 20px; display: none; }
</style>
</head>
<body id="sales">

<!-- ══ SIDEBAR ══ -->
<div id="sidebar-root"></div>

<!-- ══ MAIN ══ -->
<main class="main">
  <div class="topbar">
    <span>Operations</span>
    <span class="topbar-sep">›</span>
    <span class="topbar-current">Sales</span>
  </div>

  <div class="content">
    <div id="error-banner" class="error-banner"></div>

    <div class="page-header">
      <div>
        <h1 class="page-title">Sales</h1>
        <p class="page-subtitle" id="page-subtitle">Loading…</p>
      </div>
      <div class="header-actions">
        <div class="btn-group">
          <button class="btn active" id="range-today"   onclick="setRange('today')">Today</button>
          <button class="btn"        id="range-7days"   onclick="setRange('7days')">7 Days</button>
          <button class="btn"        id="range-30days"  onclick="setRange('30days')">30 Days</button>
        </div>
        <button class="btn btn-primary" onclick="exportCSV()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>
    </div>

    <!-- Metric Cards -->
    <div class="metric-grid">
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">Total Revenue</span>
          <div class="metric-icon" style="color:var(--green)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          </div>
        </div>
        <div class="metric-value" id="metric-revenue"><span class="spinner"></span></div>
        <div class="metric-sub" id="metric-revenue-sub"></div>
      </div>
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">Transactions</span>
          <div class="metric-icon" style="color:var(--accent)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          </div>
        </div>
        <div class="metric-value" id="metric-txns"><span class="spinner"></span></div>
        <div class="metric-sub" id="metric-txns-sub"></div>
      </div>
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">Avg. Transaction</span>
          <div class="metric-icon" style="color:var(--amber)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          </div>
        </div>
        <div class="metric-value" id="metric-avg"><span class="spinner"></span></div>
        <div class="metric-sub">Per transaction</div>
      </div>
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">Top Branch</span>
          <div class="metric-icon" style="color:var(--red)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          </div>
        </div>
        <div class="metric-value" id="metric-top-branch" style="font-size:16px;line-height:1.4"><span class="spinner"></span></div>
        <div class="metric-sub" id="metric-top-branch-sub"></div>
      </div>
    </div>

    <!-- Revenue Trend Chart -->
    <div class="chart-card">
      <div class="chart-title">Revenue Trend</div>
      <div class="chart-subtitle" id="chart-subtitle">Daily revenue over the selected period</div>
      <div style="height:220px;position:relative">
        <canvas id="revenueChart"></canvas>
      </div>
    </div>

    <!-- Transactions Table -->
    <div class="card">
      <div class="card-header">
        <span class="card-title" id="table-count">Transactions</span>
        <div class="filter-bar">
          <select class="filter-select" id="branch-filter" onchange="applyFilters()">
            <option value="">All Branches</option>
          </select>
          <select class="filter-select" id="payment-filter" onchange="applyFilters()">
            <option value="">All Payments</option>
            <option value="cash">Cash</option>
            <option value="gcash">GCash</option>
            <option value="maya">Maya</option>
            <option value="card">Card</option>
          </select>
          <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Search transactions…" oninput="applyFilters()">
          </div>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Date &amp; Time</th>
            <th>Branch</th>
            <th>Service</th>
            <th>Therapist</th>
            <th>Amount</th>
            <th>Payment</th>
          </tr>
        </thead>
        <tbody id="sales-tbody">
          <tr class="loading-row"><td colspan="6"><span class="spinner"></span> Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://bzizemhbfisbjrllyqfu.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6aXplbWhiZmlzYmpybGx5cWZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNTA4NzksImV4cCI6MjA4NTcyNjg3OX0.6K7B5reuK2b9YJO0CqtJH_VB8GLUa9aKvlb4fboVB-s';
  const H = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };

  async function db(table, params = '') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, { headers: H });
    if (!r.ok) throw new Error(`${table} ${r.status}`);
    return r.json();
  }

  const fmt = n => '₱' + Number(n || 0).toLocaleString('en-PH', { minimumFractionDigits: 0, maximumFractionDigits: 0 });

  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 6000);
  }

  function payBadge(m) {
    if (m === 'gcash') return '<span class="badge badge-blue">GCash</span>';
    if (m === 'maya')  return '<span class="badge badge-green">Maya</span>';
    if (m === 'card')  return '<span class="badge badge-purple">Card</span>';
    return '<span class="badge badge-muted">Cash</span>';
  }

  let _branches = [], _therapists = [], _services = [];
  let _allSales = [];
  let _currentRange = 'today';
  let _revenueChart = null;

  const branchName    = id => _branches.find(b => b.id === id)?.name || '—';
  const therapistName = id => _therapists.find(t => t.id === id)?.full_name || '—';
  const serviceName   = id => _services.find(s => s.id === id)?.name || '—';

  function dateRange(range) {
    const today = new Date();
    const end   = today.toISOString().split('T')[0];
    if (range === 'today') return { start: end, end, days: [end] };
    const days = [];
    const n = range === '7days' ? 7 : 30;
    for (let i = n - 1; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      days.push(d.toISOString().split('T')[0]);
    }
    return { start: days[0], end, days };
  }

  function setRange(range) {
    _currentRange = range;
    ['today', '7days', '30days'].forEach(r => {
      document.getElementById('range-' + r).classList.toggle('active', r === range);
    });
    loadSales();
  }

  function renderChart(days, sales) {
    const labels = days.map(d => {
      const dt = new Date(d + 'T00:00:00');
      return days.length <= 7
        ? dt.toLocaleDateString('en-US', { weekday: 'short' })
        : dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    });
    const data = days.map(day =>
      sales.filter(s => s.transaction_at?.startsWith(day)).reduce((s, r) => s + Number(r.amount), 0)
    );

    if (_revenueChart) _revenueChart.destroy();
    _revenueChart = new Chart(document.getElementById('revenueChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data,
          borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.08)',
          borderWidth: 2, tension: 0.45, fill: true,
          pointRadius: 3, pointBackgroundColor: '#2563eb', pointBorderColor: '#fff', pointBorderWidth: 2
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'DM Sans', size: 11 }, color: '#6b6b67' } },
          y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { family: 'DM Sans', size: 11 }, color: '#6b6b67', callback: v => '₱' + (v / 1000).toFixed(0) + 'k' } }
        }
      }
    });
  }

  function renderTable(sales) {
    const tbody = document.getElementById('sales-tbody');
    document.getElementById('table-count').textContent =
      sales.length.toLocaleString() + ' Transaction' + (sales.length !== 1 ? 's' : '');

    if (!sales.length) {
      tbody.innerHTML = '<tr class="loading-row"><td colspan="6">No transactions found.</td></tr>';
      return;
    }

    tbody.innerHTML = sales.map(r => {
      const t    = new Date(r.transaction_at);
      const date = t.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const time = t.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      return `<tr>
        <td>
          <div style="font-weight:500">${date}</div>
          <div style="font-size:12px;color:var(--muted)">${time}</div>
        </td>
        <td style="color:var(--muted)">${branchName(r.branch_id)}</td>
        <td>${serviceName(r.service_id)}</td>
        <td>${therapistName(r.therapist_id)}</td>
        <td style="font-family:'DM Mono',monospace;font-weight:500">${fmt(r.amount)}</td>
        <td>${payBadge(r.payment_method)}</td>
      </tr>`;
    }).join('');
  }

  function applyFilters() {
    const branchId = document.getElementById('branch-filter').value;
    const payment  = document.getElementById('payment-filter').value;
    const search   = document.getElementById('search-input').value.toLowerCase();

    let result = _allSales;
    if (branchId) result = result.filter(r => r.branch_id === branchId);
    if (payment)  result = result.filter(r => r.payment_method === payment);
    if (search)   result = result.filter(r =>
      branchName(r.branch_id).toLowerCase().includes(search) ||
      serviceName(r.service_id).toLowerCase().includes(search) ||
      therapistName(r.therapist_id).toLowerCase().includes(search) ||
      String(r.amount).includes(search)
    );

    renderTable(result);
  }

  async function loadSales() {
    const { start, end, days } = dateRange(_currentRange);

    // Subtitle
    const rangeLabels = {
      today:   'Today — ' + new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }),
      '7days':  'Last 7 days',
      '30days': 'Last 30 days'
    };
    document.getElementById('page-subtitle').textContent = rangeLabels[_currentRange];
    document.getElementById('chart-subtitle').textContent =
      _currentRange === 'today' ? 'Hourly revenue today' : `Daily revenue — ${rangeLabels[_currentRange].toLowerCase()}`;

    // Reset metrics to loading
    ['metric-revenue', 'metric-txns', 'metric-avg', 'metric-top-branch'].forEach(id => {
      document.getElementById(id).innerHTML = '<span class="spinner"></span>';
    });

    try {
      _allSales = await db('sales',
        `?select=*&transaction_at=gte.${start}T00:00:00&transaction_at=lte.${end}T23:59:59&order=transaction_at.desc`
      );

      // Metrics
      const total   = _allSales.reduce((s, r) => s + Number(r.amount), 0);
      const count   = _allSales.length;
      const avg     = count ? total / count : 0;

      const branchTotals = {};
      _allSales.forEach(r => { branchTotals[r.branch_id] = (branchTotals[r.branch_id] || 0) + Number(r.amount); });
      const topEntry = Object.entries(branchTotals).sort((a, b) => b[1] - a[1])[0];

      document.getElementById('metric-revenue').textContent      = fmt(total);
      document.getElementById('metric-revenue-sub').textContent  = count + ' transaction' + (count !== 1 ? 's' : '');
      document.getElementById('metric-txns').textContent         = count.toLocaleString();
      document.getElementById('metric-txns-sub').textContent     = days.length > 1 ? (count / days.length).toFixed(1) + ' per day avg' : 'Today';
      document.getElementById('metric-avg').textContent          = fmt(avg);
      document.getElementById('metric-top-branch').textContent   = topEntry ? branchName(topEntry[0]) : '—';
      document.getElementById('metric-top-branch-sub').textContent = topEntry ? fmt(topEntry[1]) + ' revenue' : '';

      renderChart(days, _allSales);

      // Populate branch dropdown on first load
      if (document.getElementById('branch-filter').options.length === 1) {
        _branches.forEach(b => {
          document.getElementById('branch-filter')
            .insertAdjacentHTML('beforeend', `<option value="${b.id}">${b.name}</option>`);
        });
      }

      applyFilters();
    } catch (e) {
      showError('Could not load sales data. ' + e.message);
      ['metric-revenue', 'metric-txns', 'metric-avg', 'metric-top-branch'].forEach(id => {
        document.getElementById(id).textContent = '—';
      });
      document.getElementById('sales-tbody').innerHTML =
        '<tr class="loading-row"><td colspan="6">Failed to load data.</td></tr>';
    }
  }

  function exportCSV() {
    if (!_allSales.length) { showError('No data to export.'); return; }
    const rows = [['Date', 'Time', 'Branch', 'Service', 'Therapist', 'Amount', 'Payment']];
    _allSales.forEach(r => {
      const t = new Date(r.transaction_at);
      rows.push([
        t.toLocaleDateString('en-US'),
        t.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
        branchName(r.branch_id),
        serviceName(r.service_id),
        therapistName(r.therapist_id),
        Number(r.amount).toFixed(2),
        r.payment_method || ''
      ]);
    });
    const csv  = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href: url, download: `sales-${_currentRange}.csv` });
    a.click();
    URL.revokeObjectURL(url);
  }

  async function init() {
    try {
      [_branches, _therapists, _services] = await Promise.all([
        db('branches',   '?select=id,name&order=name'),
        db('therapists', '?select=id,full_name'),
        db('services',   '?select=id,name')
      ]);
    } catch (e) { /* non-fatal — names will show as — */ }
    loadSales();
  }

  init();
</script>
<script src="lopez-wellness-nav.js"></script>
<script>LWNav.init();</script>
</body>
</html>
